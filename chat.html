<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat App</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
height:100vh;
}

.contacts{
width:250px;
background:#222;
overflow:auto;
}

.contact{
display:flex;
align-items:center;
padding:10px;
cursor:pointer;
border-bottom:1px solid #333;
}

.contact img{
width:35px;
height:35px;
border-radius:50%;
margin-right:10px;
}

.online{
color:#00ff7f;
font-size:12px;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
background:#333;
padding:8px;
margin:5px;
border-radius:6px;
max-width:60%;
}

.me{
background:#00b894;
margin-left:auto;
}

.input{
display:flex;
background:#222;
}

.input input{
flex:1;
padding:10px;
border:none;
}

button{
padding:10px;
border:none;
background:#00b894;
color:white;
}

.light{
background:white;
color:black;
}

</style>
</head>

<body>

<div class="contacts" id="contacts"></div>

<div class="chat">

<div id="typing"></div>

<div id="messages" class="messages"></div>

<div class="input">

<input id="msg" placeholder="Message">

<input type="file" id="file">

<button onclick="send()">Send</button>

<button onclick="toggleTheme()">🌙</button>

</div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
