<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat{
width:380px;
height:600px;
background:#1f2937;
display:flex;
flex-direction:column;
border-radius:10px;
overflow:hidden;
color:white;
}

.header{
background:#10b981;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.status{
font-size:12px;
color:#d1fae5;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
margin:6px 0;
padding:8px 10px;
border-radius:10px;
max-width:70%;
}

.me{
background:#10b981;
margin-left:auto;
}

.other{
background:#374151;
}

.msg img{
max-width:100%;
border-radius:8px;
margin-top:5px;
}

.input{
display:flex;
background:#111827;
}

.input input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.input button{
padding:10px;
border:none;
background:#10b981;
color:white;
}

</style>
</head>

<body>

<div class="chat">

<div class="header">
<span>Chat Room</span>
<span id="status" class="status">offline</span>
</div>

<div id="messages" class="messages"></div>

<div class="input">

<input id="text" placeholder="Type message">

<input type="file" id="image">

<button onclick="send()">Send</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {

apiKey:"AIzaSyCObeuL8-2slMBK3I_WMSKqnHIFK11N0is",
authDomain:"chatbot-f2c91.firebaseapp.com",
projectId:"chatbot-f2c91",
appId:"1:393885921955:web:8c95a6e8f88548d2df0516"

};

const app=initializeApp(firebaseConfig)

const auth=getAuth(app)

const db=getFirestore(app)

const storage=getStorage(app)

let currentUser=null

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser=user

status.innerText="online"

}

})


// send message
window.send=async function(){

let text=document.getElementById("text").value

let img=document.getElementById("image").files[0]

let imageUrl=null

if(img){

let storageRef=ref(storage,"chatImages/"+Date.now())

await uploadBytes(storageRef,img)

imageUrl=await getDownloadURL(storageRef)

}

await addDoc(collection(db,"messages"),{

name:currentUser.email,

text:text,

image:imageUrl,

time:Date.now()

})

text.value=""

}


// realtime messages
const q=query(collection(db,"messages"),orderBy("time"))

onSnapshot(q,(snapshot)=>{

messages.innerHTML=""

snapshot.forEach(doc=>{

let data=doc.data()

let div=document.createElement("div")

div.className="msg "+(data.name==currentUser?.email?"me":"other")

div.innerHTML="<b>"+data.name+"</b><br>"+(data.text||"")

if(data.image){

div.innerHTML+="<br><img src='"+data.image+"'>"

}

messages.appendChild(div)

})

})

</script>

</body>
</html>
