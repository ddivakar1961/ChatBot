<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>

<style>

body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#38bdf8;
border:none;
border-radius:5px;
cursor:pointer;
}

.hidden{
display:none;
}

.switch{
cursor:pointer;
text-align:center;
margin-top:10px;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="container">

<div id="loginPage">

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="switch" onclick="showSignup()">Create account</p>

</div>

<div id="signupPage" class="hidden">

<h2>Sign Up</h2>

<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<p class="switch" onclick="showLogin()">Back to Login</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyCObeuL8-2slMBK3I_WMSKqnHIFK11N0is",
authDomain:"chatbot-f2c91.firebaseapp.com",
projectId:"chatbot-f2c91",
appId:"1:393885921955:web:8c95a6e8f88548d2df0516"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


// SIGNUP
window.signup=function(){

let email=document.getElementById("signupEmail").value
let password=document.getElementById("signupPassword").value

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{
alert("Account created")
showLogin()
})

.catch(e=>alert(e.message))

}


// LOGIN
window.login=function(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

signInWithEmailAndPassword(auth,email,password)

.then(()=>{
window.location.href="chat.html"
})

.catch(e=>alert(e.message))

}


// SWITCH PAGE
window.showSignup=function(){
loginPage.classList.add("hidden")
signupPage.classList.remove("hidden")
}

window.showLogin=function(){
signupPage.classList.add("hidden")
loginPage.classList.remove("hidden")
}

</script>

</body>
</html>
